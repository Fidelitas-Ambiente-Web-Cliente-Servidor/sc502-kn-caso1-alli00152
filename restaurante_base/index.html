<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Restaurante Ficticio</title>
 
  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
 
  <!-- Google Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap"
    rel="stylesheet"
  />
 
  <!-- Estilos propios -->
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
 
  <!-- ===================================================== -->
  <!-- ENCABEZADO -->
  <!-- ===================================================== -->
  <header class="encabezado">
    <h1>Restaurante Allison</h1>
    <p class="subtitulo">Cocina de temporada, sabor de siempre</p>
  </header>
 
  <main>
 
    <!-- ===================================================== -->
    <!-- SECCION 1: MENU DEL RESTAURANTE -->
    <!-- ===================================================== -->
    <section id="menu" class="seccion-menu">
      <h2>Nuestro Menú</h2>
 
      <!-- Botones de filtro por categoria -->
      <div class="filtros" id="filtros">
        <button type="button" id="btnTodos" class="btn-filtro activo" data-categoria="Todos">Todos</button>
        <button type="button" id="btnEntradas" class="btn-filtro" data-categoria="Entrada">Entradas</button>
        <button type="button" id="btnPlatosFuertes" class="btn-filtro" data-categoria="Plato Fuerte">Platos Fuertes</button>
        <button type="button" id="btnPostres" class="btn-filtro" data-categoria="Postre">Postres</button>
      </div>
 
      <!-- Aqui se inyectan las cards -->
      <div class="row" id="contenedorMenu"></div>
    </section>
 
    <!-- ===================================================== -->
    <!-- SECCION 2: FORMULARIO DE RESERVAS -->
    <!-- ===================================================== -->
    <section id="reservas" class="seccion-reservas">
      <h2>Reserva tu Mesa</h2>
 
      <form id="form-reserva" class="row" novalidate>
 
        <div class="col-md-6">
          <label for="nombre" class="form-label">Nombre completo</label>
          <input type="text" id="nombre" class="form-control" placeholder="Ej: Allison Alvarado" />
          <div class="error-campo" id="errorNombre"></div>
        </div>
 
        <div class="col-md-6">
          <label for="correo" class="form-label">Correo electrónico</label>
          <input type="text" id="correo" class="form-control" placeholder="Ej: persona@correo.com" />
          <div class="error-campo" id="errorCorreo"></div>
        </div>
 
        <div class="col-md-4">
          <label for="fecha" class="form-label">Fecha de reserva</label>
          <input type="date" id="fecha" class="form-control" />
          <div class="error-campo" id="errorFecha"></div>
        </div>
 
        <div class="col-md-4">
          <label for="hora" class="form-label">Hora</label>
          <select id="hora" class="form-select">
            <option value="12:00">12:00</option>
            <option value="13:00">13:00</option>
            <option value="18:00">18:00</option>
            <option value="19:00">19:00</option>
            <option value="20:00">20:00</option>
          </select>
        </div>
 
        <div class="col-md-4">
          <label for="personas" class="form-label">Número de personas</label>
          <input type="number" id="personas" class="form-control" min="1" max="20" />
          <div class="error-campo" id="errorPersonas"></div>
        </div>
 
        <div class="col-12">
          <label for="comentarios" class="form-label">Comentarios (opcional)</label>
          <textarea id="comentarios" class="form-control" rows="3" placeholder="Alguna indicación especial para su reserva..."></textarea>
        </div>
 
        <div class="col-12">
          <button type="submit" id="btnReservar" class="btn-reservar" disabled>Confirmar Reserva</button>
        </div>
 
      </form>
    </section>
 
    <!-- ===================================================== -->
    <!-- TABLA DE RESERVAS REGISTRADAS -->
    <!-- ===================================================== -->
    <section id="listaReservas" class="seccion-tabla">
      <h2>Reservas Registradas</h2>
 
      <div class="tabla-wrapper">
        <table class="tabla-reservas">
          <thead>
            <tr>
              <th>Nombre</th>
              <th>Correo</th>
              <th>Fecha</th>
              <th>Hora</th>
              <th>Personas</th>
            </tr>
          </thead>
          <!-- Aqui se agregan las filas con la clase .fila-reserva -->
          <tbody id="cuerpoTablaReservas"></tbody>
        </table>
      </div>
 
      <!-- Resumen dinamico de las reservas -->
      <div class="resumen-reservas" id="resumenReservas">
        <p>Aún no hay reservas registradas.</p>
      </div>
    </section>
 
  </main>
 
  <footer class="pie">
    <p>&copy; 2026 La Mesa Verde - Estudio de Caso 1, Ambiente Web Cliente/Servidor</p>
  </footer>
 
  <script src="js/app.js"></script>
 
</body>
</html>
